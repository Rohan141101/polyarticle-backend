workflows:
  expo-ios:
    name: Expo iOS Build
    max_build_duration: 60

    environment:
      node: 18

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Install Expo & EAS CLI
        script: |
          npm install -g expo-cli eas-cli

      - name: Verify Expo login
        script: |
          echo "Using Expo token..."
          export EXPO_TOKEN=$EXPO_TOKEN
          npx expo whoami

      - name: Build iOS
        script: |
          export EXPO_TOKEN=$EXPO_TOKEN
          eas build -p ios --non-interactive

    artifacts:
      - build/*.ipa