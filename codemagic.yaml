workflows:
  expo-ios:
    name: Expo iOS Build
    max_build_duration: 60

    environment:
      node: 18

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Install Expo CLI
        script: |
          npm install -g expo-cli eas-cli

      - name: Build iOS
        script: |
          eas build -p ios --non-interactive

    artifacts:
      - build/*.ipagit 